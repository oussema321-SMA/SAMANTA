<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر سامنتا</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#111827);
  color:white;
  text-align:center;
}

header{
  background:#1e293b;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.welcome{
  background:#22c55e;
  color:black;
  padding:12px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}

.product{
  background:#1f2937;
  width:250px;
  border-radius:12px;
  overflow:hidden;
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.price{
  color:#22c55e;
  font-weight:bold;
}

button{
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

footer{
  margin-top:20px;
  padding:10px;
  background:#1e293b;
}

/* لوحة التحكم */
.admin-panel{
  display:none;
  margin-top:20px;
  padding:20px;
  background:#0f766e;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="welcome">👋 مرحبا بيك في متجر سامنتا</div>

<header>🛒 متجر سامنتا</header>

<div class="container">

  <div class="product">
    <img src="https://i.imgur.com/5bXQZ5H.jpg">
    <div class="content">
      <h3>110 جوهرة 💎</h3>
      <div class="price">1.11$</div>
      <button onclick="buy('110 جوهرة')">شراء</button>
    </div>
  </div>

  <div class="product">
    <img src="https://i.imgur.com/3ZQ3Z9m.jpg">
    <div class="content">
      <h3>500 جوهرة 💎</h3>
      <div class="price">5.3$</div>
      <button onclick="buy('500 جوهرة')">شراء</button>
    </div>
  </div>

</div>

<!-- زر لوحة التحكم -->
<button onclick="openAdmin()">🔐 لوحة التحكم</button>

<!-- لوحة التحكم -->
<div id="adminPanel" class="admin-panel">
  <h2>لوحة التحكم 🔧</h2>
  <p>مرحبا، يمكنك إدارة المتجر هنا</p>
</div>

<footer>
© متجر سامنتا
</footer>

<script>
function buy(item){
  alert("تم اختيار: " + item);
}

// فتح لوحة التحكم بكلمة سر
function openAdmin(){
  let pass = prompt("أدخل كلمة السر:");

  if(pass === "951707962005"){
    document.getElementById("adminPanel").style.display = "block";
    alert("تم الدخول إلى لوحة التحكم ✅");
  } else {
    alert("كلمة السر غير صحيحة ❌");
  }
}
</script>

</body>
</html>
