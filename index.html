<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>متجر سامنتا</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}

.product{
  background:#1f2937;
  width:250px;
  border-radius:10px;
  padding:10px;
}

img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin:5px;
  padding:8px;
  width:90%;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.admin{
  margin-top:20px;
  background:#111827;
  padding:15px;
}

input{
  margin:5px;
  padding:8px;
  width:80%;
}
</style>
</head>

<body>

<h2>🛒 متجر سامنتا</h2>

<div id="products" class="container"></div>

<!-- لوحة التحكم -->
<div class="admin">
<h3>🔐 لوحة التحكم</h3>

<input type="text" id="name" placeholder="اسم المنتج">
<input type="text" id="price" placeholder="السعر">
<input type="file" id="img">

<br>
<button onclick="login()">تسجيل الدخول</button>
<button onclick="addProduct()">إضافة منتج</button>
</div>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCGoFsHzjPlRULyWzKMR_J4CyNwx2EFm3k",
  authDomain: "oussema-d047d.firebaseapp.com",
  projectId: "oussema-d047d",
  storageBucket: "oussema-d047d.firebasestorage.app",
  messagingSenderId: "669607168107",
  appId: "1:669607168107:web:5a7d60eedf042aeb69892e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 Admin
let isAdmin = false;

function login(){
  let pass = prompt("كلمة السر:");
  if(pass === "951707962005"){
    isAdmin = true;
    alert("تم الدخول ✅");
  } else {
    alert("كلمة السر خاطئة ❌");
  }
}

// ➕ إضافة منتج
function addProduct(){
  if(!isAdmin){
    alert("ادخل أولاً");
    return;
  }

  let name = document.getElementById("name").value.trim();
  let price = document.getElementById("price").value.trim();
  let file = document.getElementById("img").files[0];

  if(!name || !price) return alert("عبي البيانات");
  if(!file) return alert("اختر صورة");

  let reader = new FileReader();

  reader.onload = function(e){
    db.collection("products").add({
      name: name,
      price: price,
      image: e.target.result,
      createdAt: new Date()
    })
    .then(()=> alert("تمت الإضافة ✅"))
    .catch(err=> alert(err.message));
  };

  reader.readAsDataURL(file);
}

// 📦 عرض المنتجات
function loadProducts(){
  db.collection("products")
  .orderBy("createdAt","desc")
  .onSnapshot(snapshot=>{
    let container = document.getElementById("products");
    container.innerHTML = "";

    snapshot.forEach(doc=>{
      let p = doc.data();

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="buy('${p.name}')">شراء</button>
        ${isAdmin ? `<button onclick="deleteProduct('${doc.id}')">❌ حذف</button>` : ""}
      `;

      container.appendChild(div);
    });
  });
}

loadProducts();

// ❌ حذف منتج
function deleteProduct(id){
  if(!isAdmin){
    alert("ممنوع");
    return;
  }

  db.collection("products").doc(id).delete()
  .then(()=> alert("تم الحذف ✅"));
}

// 📱 واتساب
function buy(name){
  let phone = "21695170796";
  let msg = "مرحبا، أريد شراء: " + name;

  window.open(
    "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg),
    "_blank"
  );
}
</script>

</body>
</html>
